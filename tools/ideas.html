<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Ideas | Vision 2040</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body[data-page="ideas"] .page-nav { display: none; }
    .ideas-hero { background: linear-gradient(135deg, #2E6E35 0%, #4A90BF 100%); color: white; padding: 3rem 2rem; text-align: center; }
    .ideas-container { max-width: 900px; margin: 2rem auto; padding: 0 2rem; }
    .idea-card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1.5rem; border-left: 4px solid #2E6E35; }
    .idea-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .idea-title { font-size: 1.2rem; font-weight: 700; color: var(--navy); }
    .idea-votes { background: #2E6E35; color: white; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; }
    .idea-submitter { font-size: 0.9rem; color: #999; margin-bottom: 0.5rem; }
    .idea-description { color: #555; margin-bottom: 1rem; }
    .vote-button { background: #2E6E35; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .vote-button:hover { background: #1a5220; }
    .submit-form { background: #f5f5f5; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--navy); }
    .form-group input, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
    .form-submit { background: #2E6E35; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
    .breadcrumb { background: var(--dark); color: white; padding: 1rem 2rem; margin-top: 76px; }
  </style>
</head>
<body data-page="ideas">

<div id="scroll-progress" role="progressbar" aria-hidden="true"></div>
<div id="nav-mount"></div>

<div class="breadcrumb">
  <a href="../index.html" style="color: var(--gold); text-decoration: none;">Home</a> › Community Ideas
</div>

<div class="ideas-hero">
  <div class="container">
    <h1>Community Ideas for Vision 2040</h1>
    <p style="font-size: 1.1rem; opacity: 0.95;">Have an idea to strengthen El Dorado's economy? Submit it, vote on others, and watch city leadership respond to top ideas monthly.</p>
  </div>
</div>

<div class="ideas-container">
  <!-- Submit Form -->
  <div class="submit-form">
    <h3 style="color: var(--navy); margin-top: 0;">Submit Your Idea</h3>

    <div class="form-group">
      <label for="ideaTitle">Idea Title *</label>
      <input type="text" id="ideaTitle" placeholder="e.g., Youth Entrepreneurship Hub">
    </div>

    <div class="form-group">
      <label for="ideaDescription">Description *</label>
      <textarea id="ideaDescription" placeholder="Describe your idea and why it matters for El Dorado" style="min-height: 100px;"></textarea>
    </div>

    <div class="form-group">
      <label for="ideaName">Your Name</label>
      <input type="text" id="ideaName" placeholder="(Optional)">
    </div>

    <button onclick="submitIdea()" class="form-submit">Submit Idea</button>
  </div>

  <!-- Ideas List -->
  <h3 style="color: var(--navy); margin-bottom: 1.5rem;">Top Ideas (Sorted by Votes)</h3>
  <div id="ideasList"></div>
</div>

<footer style="background: var(--dark); color: white; padding: 3rem 2rem; text-align: center; margin-top: 4rem;">
  <p style="margin: 0; opacity: 0.8;">Vision 2040 | El Dorado, Kansas | <a href="../index.html" style="color: var(--gold); text-decoration: none;">Back to Home</a></p>
</footer>

<script src="../js/nav.js"></script>
<script>
  function submitIdea() {
    const title = document.getElementById('ideaTitle').value;
    const description = document.getElementById('ideaDescription').value;
    const name = document.getElementById('ideaName').value || 'Anonymous';

    if (!title || !description) {
      alert('Please fill in title and description.');
      return;
    }

    const idea = {
      id: Date.now(),
      title: title,
      description: description,
      submitter: name,
      votes: 0,
      date: new Date().toLocaleDateString(),
      hasResponse: false
    };

    let ideas = JSON.parse(localStorage.getItem('communityIdeas') || '[]');
    ideas.push(idea);
    localStorage.setItem('communityIdeas', JSON.stringify(ideas));

    document.getElementById('ideaTitle').value = '';
    document.getElementById('ideaDescription').value = '';
    document.getElementById('ideaName').value = '';

    alert('Thank you! Your idea has been submitted and will appear in the list.');
    displayIdeas();

    if (typeof gtag !== 'undefined') {
      gtag('event', 'idea_submit');
    }
  }

  function voteIdea(ideaId) {
    let ideas = JSON.parse(localStorage.getItem('communityIdeas') || '[]');
    const idea = ideas.find(i => i.id === ideaId);
    if (idea) {
      idea.votes++;
      localStorage.setItem('communityIdeas', JSON.stringify(ideas));
      displayIdeas();
    }
  }

  function displayIdeas() {
    let ideas = JSON.parse(localStorage.getItem('communityIdeas') || '[]');
    ideas.sort((a, b) => b.votes - a.votes);

    let html = '';
    if (ideas.length === 0) {
      html = '<p style="text-align: center; color: #999;">No ideas yet. Be the first to submit one!</p>';
    } else {
      ideas.forEach(idea => {
        html += `
          <div class="idea-card">
            <div class="idea-header">
              <div>
                <div class="idea-title">${idea.title}</div>
                <div class="idea-submitter">Submitted by ${idea.submitter} on ${idea.date}</div>
              </div>
              <div class="idea-votes">${idea.votes} 👍</div>
            </div>
            <div class="idea-description">${idea.description}</div>
            <button onclick="voteIdea(${idea.id})" class="vote-button">👍 Vote for This Idea</button>
            ${idea.hasResponse ? '<div style="margin-top: 1rem; padding: 1rem; background: #e8f5e9; border-radius: 4px; color: #2E6E35;"><strong>✓ Leadership Response:</strong> This idea is being explored. More details coming soon.</div>' : ''}
          </div>
        `;
      });
    }

    document.getElementById('ideasList').innerHTML = html;
  }

  window.addEventListener('load', displayIdeas);
</script>
<script src="../js/analytics.js" defer></script>

</body>
</html>
